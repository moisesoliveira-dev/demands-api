services:
  postgres:
    image: postgres:16-alpine
    container_name: demands-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: demands
      POSTGRES_PASSWORD: demands
      POSTGRES_DB: demands
    ports:
      - "5432:5432"
    volumes:
      - demands-pgdata:/var/lib/postgresql/data

volumes:
  demands-pgdata:
